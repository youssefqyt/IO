<ion-content [fullscreen]="true">
  <div class="splash-container ion-padding">
    <div class="brand-content animate-brand">
      <div class="logo-wrapper">
        <img src="assets/image/logo.svg" alt="Free Work Logo" class="brand-logo">
      </div>
      
      <h1 class="brand-title">Free Work</h1>
      <p class="brand-subtitle">FreelanceHub</p>

      <div class="loading-container">
        <div class="loading-track">
          <div class="loading-bar"></div>
        </div>
      </div>
    </div>

    <div class="footer mt-auto">
      <p class="footer-text">Professional Network</p>
    </div>
  </div>
</ion-content>
