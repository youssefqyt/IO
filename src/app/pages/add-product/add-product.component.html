<ion-content [fullscreen]="true" class="font-display antialiased text-slate-900 dark:text-slate-100">
  <div class="relative min-h-screen max-w-md mx-auto overflow-hidden bg-white dark:bg-slate-900">
    <div class="absolute inset-0 pattern-bg pointer-events-none"></div>

    <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 ios-blur px-6 pt-12 pb-4 border-b border-slate-100 dark:border-slate-800">
      <div class="flex items-center justify-between">
        <button (click)="goBack()" class="p-2 -ml-2 rounded-full transition-colors hover:bg-slate-100 dark:hover:bg-slate-800">
          <span class="material-symbols-outlined align-middle">arrow_back_ios_new</span>
        </button>
        <h1 class="text-xl font-bold">Add Product</h1>
        <div class="w-10"></div>
      </div>
    </header>

    <main class="relative z-10 px-6 py-6 space-y-6 pb-24">
      <section class="rounded-2xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800/50 p-5 shadow-sm">
        <h2 class="text-sm font-bold uppercase tracking-wider text-slate-900 dark:text-white">Marketplace Product</h2>
        <p class="mt-2 text-sm text-slate-500">Share a new digital product for freelancers and clients to discover in the marketplace.</p>
      </section>

      <form class="space-y-5" (ngSubmit)="submitProduct()">
        <div>
          <label class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Product Title</label>
          <input
            type="text"
            [(ngModel)]="productTitle"
            name="productTitle"
            class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-700 focus:border-primary focus:bg-white focus:outline-none"
            placeholder="UI Kit Pro"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="productCategory" class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Category</label>
            <select
              id="productCategory"
              [(ngModel)]="productCategory"
              name="productCategory"
              aria-label="Product category"
              title="Product category"
              class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-700 focus:border-primary focus:bg-white focus:outline-none"
            >
              <option *ngFor="let category of productCategories" [value]="category">{{ category }}</option>
            </select>
          </div>
          <div>
            <label class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Price</label>
            <input
              type="number"
              [(ngModel)]="productPrice"
              name="productPrice"
              class="h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-700 focus:border-primary focus:bg-white focus:outline-none"
              placeholder="49"
            />
          </div>
        </div>

        <div>
          <label class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Description</label>
          <textarea
            [(ngModel)]="productDescription"
            name="productDescription"
            rows="5"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700 focus:border-primary focus:bg-white focus:outline-none"
            placeholder="Describe your product and what buyers will get."
          ></textarea>
        </div>

        <div>
          <label class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Includes</label>
          <textarea
            [(ngModel)]="productIncludes"
            name="productIncludes"
            rows="4"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700 focus:border-primary focus:bg-white focus:outline-none"
            placeholder="Landing page file, components, icon set"
          ></textarea>
        </div>

        <div>
          <label class="mb-2 block text-xs font-bold uppercase tracking-wider text-slate-500">Preview Image</label>
          <label class="flex cursor-pointer items-center justify-between rounded-2xl border border-dashed border-slate-300 bg-slate-50 px-4 py-4">
            <div class="min-w-0">
              <p class="truncate text-sm font-semibold text-slate-900">{{ productImageName || 'Choose product image' }}</p>
              <p class="text-xs text-slate-500">PNG, JPG, or JPEG</p>
            </div>
            <span class="material-symbols-outlined text-slate-400">upload</span>
            <input type="file" accept=".png,.jpg,.jpeg" class="hidden" (change)="onProductImageSelected($event)" />
          </label>
        </div>

        <p *ngIf="productErrorMessage" class="rounded-xl bg-red-50 px-3 py-2 text-[12px] font-semibold text-red-600">
          {{ productErrorMessage }}
        </p>
        <p *ngIf="productSuccessMessage" class="rounded-xl bg-emerald-50 px-3 py-2 text-[12px] font-semibold text-emerald-700">
          {{ productSuccessMessage }}
        </p>

        <button
          type="submit"
          [disabled]="isSavingProduct"
          class="w-full rounded-2xl bg-primary py-4 text-sm font-bold text-white shadow-lg shadow-primary/20 disabled:opacity-60"
        >
          {{ isSavingProduct ? 'Saving Product...' : 'Add Product to Marketplace' }}
        </button>
      </form>
    </main>
  </div>
</ion-content>
