<ion-content [fullscreen]="true" class="edit-profile-content bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div class="relative w-full max-w-[412px] min-h-screen mx-auto bg-white dark:bg-slate-900 flex flex-col overflow-hidden">
    <header class="px-6 pt-8 pb-4 flex items-center justify-between textured-bg">
      <button (click)="goBack()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 active:scale-90 transition-transform">
        <span class="material-symbols-outlined text-[20px]">arrow_back_ios_new</span>
      </button>
      <h1 class="text-lg font-bold tracking-tight">Edit Profile</h1>
      <div class="w-10"></div>
    </header>

    <main class="flex-1 px-6 overflow-y-auto pb-32">
      <div class="flex flex-col items-center mt-6 mb-8">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-2xl font-black text-primary italic">FW</span>
          <span class="text-sm font-semibold tracking-wide uppercase opacity-70">Free Work</span>
        </div>
      </div>

      <div class="relative w-full h-32 bg-primary rounded-2xl mb-12">
        <div class="absolute -bottom-8 left-6 w-20 h-20 rounded-2xl bg-slate-200 dark:bg-slate-700 border-4 border-white dark:border-slate-900 flex items-center justify-center overflow-hidden">
          <span class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-4xl">person</span>
          <label class="absolute bottom-0 right-0 bg-primary p-1.5 rounded-tl-lg text-white cursor-pointer">
            <span class="material-symbols-outlined text-[14px]">edit</span>
            <input type="file" class="hidden" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" (change)="onCvSelected($event)" />
          </label>
        </div>
      </div>

      <form class="space-y-6">
        <div class="space-y-1.5">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Full Name</label>
          <input [(ngModel)]="fullName" name="fullName" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="John Doe" type="text" />
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Competence / Title</label>
          <input [(ngModel)]="title" name="title" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="UX/UI Designer &amp; Developer" type="text" />
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Bio</label>
          <textarea [(ngModel)]="bio" name="bio" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600 resize-none" placeholder="Tell us about your background..." rows="4"></textarea>
        </div>

        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Skills</label>
          <div class="flex flex-wrap gap-2">
            <span *ngFor="let skill of skills" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-full bg-primary/10 text-primary text-xs font-semibold">
              {{ skill }}
              <button type="button" (click)="removeSkill(skill)" class="leading-none">x</button>
            </span>
          </div>
          <div class="flex gap-2">
            <input
              [(ngModel)]="skillInput"
              name="skillInput"
              (keydown.enter)="onSkillEnter($event)"
              class="flex-1 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-4 py-3 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600"
              placeholder="Add a skill"
              type="text"
            />
            <button type="button" (click)="addSkill()" class="px-4 py-3 rounded-2xl bg-primary text-white font-semibold">Add</button>
          </div>
        </div>

        <div class="space-y-1.5">
          <p class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">CV / Portfolio (PDF)</p>
          <label class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl px-5 py-8 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
            <span class="material-symbols-outlined text-primary mb-2 text-3xl">cloud_upload</span>
            <p class="text-sm font-medium text-slate-600 dark:text-slate-300">
              {{ cvFileName ? cvFileName : 'Tap to upload your resume' }}
            </p>
            <p class="text-xs text-slate-400 mt-1">Maximum file size: 5MB</p>
            <input type="file" class="hidden" accept=".pdf" (change)="onCvSelected($event)" />
          </label>
        </div>
      </form>
    </main>

    <div class="absolute bottom-0 inset-x-0 p-6 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 flex flex-col gap-3">
      <button (click)="confirmProfile()" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">
        Confirm Profile
      </button>
      <p *ngIf="saveMessage" class="text-center text-sm font-semibold text-emerald-600">{{ saveMessage }}</p>
    </div>
  </div>
</ion-content>
