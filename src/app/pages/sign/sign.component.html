
<div class="sign-wrapper">
  <div class="pattern-bg" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>

  <div class="header">
    <div class="brand" aria-hidden="true">
      <svg width="75" height="60" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brand">
        <defs>
          <linearGradient id="brandGradient" x1="20" y1="0" x2="80" y2="75" gradientUnits="userSpaceOnUse">
            <stop stop-color="#2563EB"/>
            <stop offset="1" stop-color="#1D4ED8"/>
          </linearGradient>
        </defs>
        <path d="M20 10C20 4.47715 24.4772 0 30 0H70C75.5228 0 80 4.47715 80 10V20C80 25.5228 75.5228 30 70 30H45V45H65C70.5228 45 75 49.4772 75 55V65C75 70.5228 70.5228 75 65 75H30C24.4772 75 20 70.5228 20 65V10Z" fill="url(#brandGradient)"/>
        <path d="M50 35L65 65L80 35L95 65" stroke="#F97316" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="title">Create Account</h1>
    <p class="subtitle">Join the professional network</p>
  </div>

  <form class="signup" (submit)="$event.preventDefault()" novalidate>
    <div>
      <label class="label">Select Your Role</label>
      <div class="role-grid">
        <!-- Freelancer (selected) -->
        <div class="role-card selected" tabindex="0" aria-pressed="true" role="button">
          <div class="role-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="role-icon" aria-hidden="true">
            <!-- briefcase/work icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7h16a2 2 0 0 1 2 2v8a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V9a2 2 0 0 1 2-2Z"/>
              <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
              <path d="M3 13h18"/>
            </svg>
          </div>
          <span class="role-title">Freelancer</span>
        </div>

        <!-- Client -->
        <div class="role-card" tabindex="0" aria-pressed="false" role="button">
          <div class="role-icon" aria-hidden="true" style="background: #F1F5F9;">
            <!-- business/handshake icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2">
              <path d="M12 5l-2 2-2-2-4 4 6 6 4-4"/>
              <path d="M22 7l-4-4-4 4 2 2 4-4 2 2Z"/>
              <path d="M14 13l3 3"/>
            </svg>
          </div>
          <span class="role-title muted">Client</span>
        </div>
      </div>
    </div>

    <div>
      <label class="label" for="fullname">Full Name</label>
      <input id="fullname" name="fullname" type="text" class="input" placeholder="John Doe"/>
    </div>

    <div>
      <label class="label" for="email">Email Address</label>
      <input id="email" name="email" type="email" class="input" placeholder="name@example.com"/>
    </div>

    <div>
      <label class="label" for="password">Password</label>
      <div class="input-row">
        <input id="password" name="password" type="password" class="input" placeholder="••••••••"/>
        <button class="toggle-btn" type="button" aria-label="Toggle password visibility" title="Toggle visibility" disabled>
          <!-- eye icon (static) -->
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="submit">Sign Up</button>
  </form>

  <div class="divider" aria-hidden="true">
    <div class="line"></div>
    <span class="label">Or continue with</span>
    <div class="line"></div>
  </div>

  <div class="providers">
    <button type="button" class="provider" aria-label="Continue with Google">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google
    </button>

    <button type="button" class="provider" aria-label="Continue with Apple">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M17.05 20.28c-.96.95-2.44.83-3.15.83-1.5 0-2.38-.83-3.57-.83-1.2 0-2.2.83-3.58.83-.72 0-2.13.11-3.14-.83C2.18 18.91 1 15.65 1 12.57c0-3.32 2.14-5.08 4.2-5.08 1.1 0 2.13.68 2.8.68.68 0 1.94-.78 3.2-.78 1.55 0 2.88.75 3.65 1.84-3.14 1.83-2.63 6.07.5 7.42-.64 1.56-1.5 3.01-2.3 3.63zm-3.83-14.8c0-1.87 1.55-3.48 3.43-3.48.22 2.21-1.92 3.96-3.43 3.48z"></path>
      </svg>
      Apple
    </button>
  </div>

  <div class="footer-cta">
    <span>Already have an account?</span>
    <a routerLink="/login">Log In</a>
  </div>

  <div class="footer-badge">Professional Network</div>
</div>
