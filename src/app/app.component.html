<ion-app>
  <ion-router-outlet></ion-router-outlet>
  
  <ion-tab-bar slot="bottom" *ngIf="router.url !== '/start'">
    <ion-tab-button routerLink="/home" routerLinkActive="selected">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>
    <ion-tab-button routerLink="/Settings" routerLinkActive="selected">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Settings</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-app>
