
<ion-content class="bg-slate-50 dark:bg-slate-950 font-display relative" [fullscreen]="true">
  <!-- Dot Pattern Background -->
  <div class="absolute inset-0 dot-pattern pointer-events-none opacity-[0.05]"></div>

  <ion-grid class="min-h-full flex flex-col items-center justify-center relative z-10">
    <ion-row class="w-full justify-center">
      <ion-col size="12" size-md="8" size-lg="6" size-xl="4" class="max-w-[440px] bg-white dark:bg-slate-900 shadow-2xl shadow-slate-200/50 dark:shadow-none min-h-screen md:min-h-0 md:rounded-[40px] md:my-10 ion-padding">
        
        <!-- Logo Section -->
        <div class="flex flex-col items-center mt-6 mb-10">
          <div class="mb-6 relative">
            <img src="assets/image/logo.svg" alt="Free Work Logo" class="h-[68px] w-[85px]">
          </div>
          <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight text-center">Sign In</h1>
          <p class="text-slate-400 dark:text-slate-500 mt-2 font-medium text-center">Welcome back to Free Work</p>
        </div>

        <form class="space-y-6" (ngSubmit)="onLogin()">
          <!-- Email Field -->
          <div class="space-y-1.5">
            <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Email Address</label>
            <ion-item lines="none" class="bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl transition-all focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/10" style="--background: transparent; --padding-start: 0; --inner-padding-end: 0; --highlight-height: 0;">
              <ion-input
                [(ngModel)]="email"
                name="email"
                type="email"
                placeholder="name@example.com"
                class="text-slate-900 dark:text-white font-medium px-4"
                required
              ></ion-input>
            </ion-item>
          </div>

          <!-- Password Field -->
          <div class="space-y-1.5">
            <label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Password</label>
            <ion-item lines="none" class="bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl transition-all focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/10" style="--background: transparent; --padding-start: 0; --inner-padding-end: 0; --highlight-height: 0;">
              <ion-input
                [(ngModel)]="password"
                name="password"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="••••••••"
                class="text-slate-900 dark:text-white font-medium px-4"
                required
              ></ion-input>
              <ion-button slot="end" fill="clear" (click)="togglePassword()" class="text-slate-400 mr-2" type="button">
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="icon-only" class="text-xl"></ion-icon>
              </ion-button>
            </ion-item>
          </div>

          <p *ngIf="errorMessage" class="text-sm text-red-500 font-semibold">
            {{ errorMessage }}
          </p>

          <!-- Forgot Password -->
          <div class="flex justify-end">
            <a routerLink="/forgot-password" class="text-[13px] font-bold text-blue-600 hover:opacity-80 transition-all">Forgot password?</a>
          </div>

          <!-- Sign In Button -->
          <button type="submit" [disabled]="isLoading" class="w-full py-5 bg-[#257bf4] hover:bg-blue-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-blue-100 mt-4 active:scale-[0.98] text-base disabled:opacity-60 disabled:cursor-not-allowed">
            {{ isLoading ? 'Signing In...' : 'Sign In' }}
          </button>
        </form>

        <!-- Social Divider -->
        <div class="flex items-center my-12 px-4">
          <div class="flex-grow border-t border-slate-100 dark:border-slate-800"></div>
          <span class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-[0.1em] whitespace-nowrap">OR CONTINUE WITH</span>
          <div class="flex-grow border-t border-slate-100 dark:border-slate-800"></div>
        </div>

        <!-- Social Buttons -->
        <div class="grid grid-cols-2 gap-4 mb-8">
          <button type="button" class="flex items-center justify-center gap-2 py-4 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl font-bold text-slate-700 dark:text-slate-200 hover:bg-slate-50 transition-all shadow-sm">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button type="button" class="flex items-center justify-center gap-2 py-4 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl font-bold text-slate-700 dark:text-slate-200 hover:bg-slate-50 transition-all shadow-sm">
            <svg class="w-5 h-5 text-slate-900 dark:text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.039 2.48-4.5 2.597-4.571-1.428-2.09-3.623-2.324-4.402-2.363-1.65-.13-3.273 1.04-3.998 1.092zm1.61-4.701c.727-1.208.507-2.194.415-2.194-.233 0-1.766.429-2.61 1.416-.844.987-1.117 2.117-.987 2.117.169 0 1.623-.286 2.519-1.339z"/>
            </svg>
            Apple
          </button>
        </div>

        <!-- Footer -->
        <div class="mt-4 text-center pb-8">
          <p class="text-[14px] text-slate-400 font-medium">
            Don't have an account? 
            <a routerLink="/sign" class="text-blue-600 font-bold ml-1 hover:underline">Sign Up</a>
          </p>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
