<ion-content class="bg-slate-50 dark:bg-slate-950 font-display relative" [fullscreen]="true">
  <div class="absolute inset-0 dot-pattern pointer-events-none opacity-[0.05]"></div>

  <div class="relative min-h-full w-full max-w-full flex flex-col">
    <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl px-6 pt-12 pb-2 border-b border-slate-100 dark:border-slate-800">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2 min-w-0">
          <div class="scale-75 origin-left">
            <img src="assets/image/logo.svg" alt="Free Work Logo" class="h-10 w-auto">
          </div>
          <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight truncate">Messages</h1>
        </div>
        <button class="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center border border-slate-100 dark:border-slate-700 shadow-sm transition-all active:scale-95">
          <span class="material-symbols-outlined text-slate-600 dark:text-slate-300">edit_square</span>
        </button>
      </div>
      <div class="relative mb-2">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl font-light">search</span>
        <input
          [(ngModel)]="searchTerm"
          class="w-full bg-slate-100/80 dark:bg-slate-800/80 border-none rounded-2xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-slate-400 dark:text-white transition-all"
          placeholder="Search conversations by name..."
          type="text"
        />
      </div>
    </header>

    <main class="flex-1 relative z-10 px-4 pt-2 pb-24">
      <div *ngIf="filteredConversations.length; else emptyState" class="divide-y divide-slate-50 dark:divide-slate-900">
        <div
          *ngFor="let conversation of filteredConversations"
          [routerLink]="['/message/chat']"
          [queryParams]="{
            conversationId: conversation.conversationId,
            projectId: conversation.projectId,
            otherUserId: conversation.otherUserId,
            otherUserName: conversation.name
          }"
          class="flex items-center gap-4 py-4 px-2 cursor-pointer transition-all active:bg-slate-50 dark:active:bg-slate-900/50 rounded-2xl group"
        >
          <div class="relative flex-shrink-0">
            <div class="w-14 h-14 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center overflow-hidden border border-slate-100 dark:border-slate-700 group-hover:scale-105 transition-transform">
              <span class="material-symbols-outlined text-slate-400 text-3xl font-light">person</span>
            </div>
            <div *ngIf="conversation.isOnline" class="absolute top-0 right-0 w-3.5 h-3.5 bg-primary border-2 border-white dark:border-slate-900 rounded-full shadow-sm"></div>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-baseline mb-0.5">
              <h3 class="font-bold text-slate-900 dark:text-white truncate">{{ conversation.name }}</h3>
              <span
                class="text-[11px] font-medium"
                [class.text-primary]="conversation.isUnread"
                [class.font-bold]="conversation.isUnread"
                [class.text-slate-400]="!conversation.isUnread"
                [class.dark:text-slate-500]="!conversation.isUnread"
              >
                {{ conversation.time }}
              </span>
            </div>
            <p
              class="text-sm truncate leading-snug"
              [class.text-slate-900]="conversation.isUnread"
              [class.dark:text-slate-200]="conversation.isUnread"
              [class.font-semibold]="conversation.isUnread"
              [class.text-slate-500]="!conversation.isUnread"
              [class.dark:text-slate-400]="!conversation.isUnread"
              [class.font-medium]="!conversation.isUnread"
            >
              {{ conversation.lastMessage }}
            </p>
          </div>
        </div>
      </div>

      <ng-template #emptyState>
        <div class="flex min-h-[45vh] flex-col items-center justify-center px-6 text-center">
          <span class="material-symbols-outlined mb-4 text-5xl text-slate-300 dark:text-slate-600">search_off</span>
          <h2 class="text-lg font-bold text-slate-900 dark:text-white">No conversation found</h2>
          <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">
            Try searching with another name.
          </p>
        </div>
      </ng-template>
    </main>
  </div>
</ion-content>
