<ion-header>
  <div class="relative z-10 px-6 pt-12 pb-6">
    <div class="flex items-center gap-2 mb-8">
      <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
        <span class="text-white font-bold text-xs">FW</span>
      </div>
      <div class="h-1 w-12 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full bg-primary w-2/3 rounded-full"></div>
      </div>
    </div>
    <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">
      What are you interested in?
    </h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2">
      Choose categories to customize your feed and find relevant opportunities.
    </p>
  </div>
</ion-header>

<ion-content>
  <div class="relative min-h-screen max-w-md mx-auto overflow-hidden flex flex-col bg-background-light dark:bg-background-dark">
    <div class="absolute inset-0 pattern-bg pointer-events-none"></div>
    <div class="absolute top-[-5%] right-[-5%] w-64 h-64 bg-primary/5 dark:bg-primary/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 flex-1 px-6 pb-32 overflow-y-auto">
      <div class="grid grid-cols-2 gap-4">
        <div *ngFor="let interest of interests"
             class="relative flex flex-col items-start p-4 text-left bg-white dark:bg-slate-900 border-2 rounded-2xl shadow-sm transition-all cursor-pointer"
             [class.selected]="interest.selected"
             (click)="toggleInterest(interest)">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-primary mb-3"
               [class]="interest.selected ? 'bg-primary/10 text-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400'">
            <span class="material-symbols-outlined">{{ interest.icon }}</span>
          </div>
          <span class="font-semibold text-slate-900 dark:text-white">{{ interest.name }}</span>
          <div *ngIf="interest.selected" class="absolute top-3 right-3 w-5 h-5 bg-secondary rounded-full flex items-center justify-center shadow-sm">
            <span class="material-symbols-outlined text-[14px] text-white font-bold">check</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer>
  <div class="p-6 bg-gradient-to-t from-white via-white/95 to-transparent dark:from-background-dark dark:via-background-dark/95">
    <button class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2"
            (click)="continue()">
      Continue
      <span class="material-symbols-outlined">arrow_forward</span>
    </button>
    <p class="text-center text-slate-400 text-xs mt-4 font-medium uppercase tracking-widest">
      You can change this later
    </p>
  </div>
</ion-footer>
