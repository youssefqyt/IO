<article
  class="cursor-pointer rounded-2xl border border-slate-100 bg-white p-4 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md dark:border-slate-800 dark:bg-slate-800/50"
  [class.opacity-80]="project.actionDisabled"
  (click)="onSelect()"
  (keydown.enter)="onSelect()"
  (keydown.space)="onSelect(); $event.preventDefault()"
  tabindex="0"
>
  <div class="mb-3 flex items-start justify-between gap-3">
    <div>
      <h3 class="font-bold text-slate-900 dark:text-white">{{ project.title }}</h3>
      <p class="text-xs text-slate-500 mt-0.5">
        Order #{{ project.orderId }}
        <span *ngIf="project.timeLabel">• {{ project.timeLabel }}</span>
      </p>
    </div>
    <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border" [ngClass]="project.statusClass">
      {{ project.status }}
    </span>
  </div>

  <div class="flex items-center justify-between mt-4">
    <div class="text-xs text-slate-500">
      {{
        project.clientName
          ? ('Client: ' + project.clientName)
          : (project.freelancerName ? ('Freelancer: ' + project.freelancerName) : (project.helperText || ''))
      }}
    </div>
    <div class="flex items-center gap-3">
      <button
        *ngIf="project.actionLabel"
        type="button"
        (click)="onAction($event)"
        [disabled]="project.actionDisabled"
        class="text-xs font-bold flex items-center gap-1 transition-opacity"
        [ngClass]="project.actionDisabled ? 'text-slate-400 cursor-not-allowed' : 'text-secondary hover:opacity-80'"
      >
        {{ project.actionLabel }}
        <span *ngIf="project.actionIcon" class="material-symbols-outlined text-sm">{{ project.actionIcon }}</span>
      </button>
      <span class="material-symbols-outlined text-base text-slate-300 dark:text-slate-600">chevron_right</span>
    </div>
  </div>

  <div *ngIf="project.progressPercent !== undefined" class="mt-4 h-1.5 w-full overflow-hidden rounded-full bg-slate-100 dark:bg-slate-700">
    <div class="h-full rounded-full" [ngClass]="project.progressBarClass || 'bg-secondary'" [style.width.%]="project.progressPercent"></div>
  </div>
</article>
