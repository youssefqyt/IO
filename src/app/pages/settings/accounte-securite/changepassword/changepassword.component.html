<ion-content class="bg-white dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="w-full max-w-full px-4 py-8">
    <header class="flex items-center gap-3 mb-6">
      <button type="button" (click)="goBack()" class="h-10 w-10 rounded-full border border-slate-300 dark:border-slate-700">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
      </button>
      <h1 class="text-2xl font-bold">Change Password</h1>
    </header>

    <div class="space-y-4">
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Current Password</label>
        <ion-item class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 mt-1">
          <ion-input
            name="currentPassword"
            type="password"
            placeholder="Enter current password"
            [(ngModel)]="currentPassword">
          </ion-input>
        </ion-item>
        <p *ngIf="formErrors.currentPassword" class="text-red-500 text-sm mt-1 ml-1">{{ formErrors.currentPassword }}</p>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">New Password</label>
        <ion-item class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 mt-1">
          <ion-input
            name="newPassword"
            type="password"
            placeholder="At least 8 characters"
            [(ngModel)]="newPassword">
          </ion-input>
        </ion-item>
        <p *ngIf="formErrors.newPassword" class="text-red-500 text-sm mt-1 ml-1">{{ formErrors.newPassword }}</p>
      </div>

      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Confirm Password</label>
        <ion-item class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 mt-1">
          <ion-input
            name="confirmPassword"
            type="password"
            placeholder="Re-enter new password"
            [(ngModel)]="confirmPassword">
          </ion-input>
        </ion-item>
        <p *ngIf="formErrors.confirmPassword" class="text-red-500 text-sm mt-1 ml-1">{{ formErrors.confirmPassword }}</p>
      </div>
    </div>

    <p *ngIf="formErrors.general" class="text-red-500 text-sm mt-4">{{ formErrors.general }}</p>
    <p *ngIf="successMessage" class="text-green-600 text-sm mt-4">{{ successMessage }}</p>

    <button
      type="button"
      (click)="onSubmit()"
      [disabled]="isLoading"
      class="w-full mt-6 py-3 rounded-2xl font-semibold text-white bg-primary disabled:opacity-60">
      {{ isLoading ? 'Updating...' : 'Update Password' }}
    </button>
  </div>
</ion-content>
