<ion-content class="bg-white dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
  <div class="relative w-full max-w-full px-4 flex flex-col min-h-full pb-32">
    <header class="pt-16 pb-6 relative z-10">
      <h1 class="text-3xl font-bold tracking-tight px-2">Settings</h1>
    </header>

    <main class="flex-1 space-y-8 relative z-10 px-2">
      <!-- Profile Section -->
      <section (click)="goToProfile()" class="flex items-center space-x-4 p-4 bg-primary/5 dark:bg-primary/10 rounded-2xl border border-primary/10 cursor-pointer transition-all active:scale-[0.99]">
        <div class="relative">
          <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-white dark:border-slate-700 shadow-md">
            <img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBx6GTb38msY05eLB7bZa0-dtMUeIhrd6Ag_Nkpbf0OKJQG6oNvxbSWz1BucvWmzn3SnCBjldOfqHkCcQ6J8bF35Ul7VxqqJG5s4rv7QpzwcAEdrAfmfPJfdPhx4pVse8lRC-3yAAdQbtPLAEOMdj1uN0zR8a8C2vC62nZMkgp8vSjWJv5FO9Jkv9h6U1aTUvy2imu61zVafptyLsqYAF1BMmf6yGmFYXYKTLKvnIOWBRlGJ6Y6PRq2H4PdLQJYwdHAjnCoenIDbnhy"/>
          </div>
          <div class="absolute -bottom-1 -right-1 bg-primary text-white p-1 rounded-full shadow-lg flex items-center justify-center border-2 border-white dark:border-slate-800">
            <span class="material-icons-round text-[10px]">verified</span>
          </div>
        </div>
        <div>
          <h3 class="font-bold text-lg text-slate-900 dark:text-white">{{ profile.fullName }}</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">{{ profile.title || (profile.role === 'client' ? 'Client Account' : 'Freelancer') }}</p>
        </div>
      </section>

      <!-- Account & Security Section -->
      <div class="space-y-1">
        <h4 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-3 px-1">Account & Security</h4>
        <div class="bg-slate-50/50 dark:bg-slate-900/50 rounded-2xl px-2">
          <button (click)="goToAccountSecurity()" class="w-full flex items-center justify-between py-4 px-2 group">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">shield_person</span>
              </div>
              <span class="font-medium text-[15px]">Account Security</span>
            </div>
            <span class="material-icons-round text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
          </button>
          <div class="h-px bg-slate-200/50 dark:bg-slate-800 ml-14"></div>
          <button class="w-full flex items-center justify-between py-4 px-2 group">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">payments</span>
              </div>
              <span class="font-medium text-[15px]">Payment Methods</span>
            </div>
            <span class="material-icons-round text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
          </button>
        </div>
      </div>

      <!-- App Preferences Section -->
      <div class="space-y-1">
        <h4 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-3 px-1">App Preferences</h4>
        <div class="bg-slate-50/50 dark:bg-slate-900/50 rounded-2xl px-2">
          <div class="w-full flex items-center justify-between py-4 px-2">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">dark_mode</span>
              </div>
              <span class="font-medium text-[15px]">Dark Mode</span>
            </div>
            <button
              type="button"
              (click)="toggleDarkMode()"
              class="relative h-6 w-12 rounded-full transition-colors"
              [class.bg-primary]="isDarkMode"
              [class.bg-slate-200]="!isDarkMode"
            >
              <div
                class="absolute top-1 h-4 w-4 rounded-full bg-white shadow-sm transition-all"
                [class.right-1]="isDarkMode"
                [class.left-1]="!isDarkMode"
              ></div>
            </button>
          </div>
          <div class="h-px bg-slate-200/50 dark:bg-slate-800 ml-14"></div>
          <button class="w-full flex items-center justify-between py-4 px-2 group">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">notifications</span>
              </div>
              <span class="font-medium text-[15px]">Notification Preferences</span>
            </div>
            <span class="material-icons-round text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
          </button>
          <div class="h-px bg-slate-200/50 dark:bg-slate-800 ml-14"></div>
          <button class="w-full flex items-center justify-between py-4 px-2 group">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">language</span>
              </div>
              <div class="flex flex-col items-start">
                <span class="font-medium text-[15px]">Language</span>
                <span class="text-[11px] text-slate-400">English (US)</span>
              </div>
            </div>
            <span class="material-icons-round text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
          </button>
        </div>
      </div>

      <!-- Support Section -->
      <div class="space-y-1">
        <h4 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-3 px-1">Support</h4>
        <div class="bg-slate-50/50 dark:bg-slate-900/50 rounded-2xl px-2">
          <button class="w-full flex items-center justify-between py-4 px-2 group">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">contact_support</span>
              </div>
              <span class="font-medium text-[15px]">Help & Support</span>
            </div>
            <span class="material-icons-round text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
          </button>
          <div class="h-px bg-slate-200/50 dark:bg-slate-800 ml-14"></div>
          <button class="w-full flex items-center justify-between py-4 px-2 group">
            <div class="flex items-center space-x-4">
              <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm">
                <span class="material-symbols-outlined text-[22px]">info</span>
              </div>
              <span class="font-medium text-[15px]">About FreelanceHub</span>
            </div>
            <span class="material-icons-round text-slate-300 group-hover:text-primary transition-colors">chevron_right</span>
          </button>
        </div>
      </div>

      <!-- Logout Section -->
      <div class="pt-4 space-y-6 pb-12">
        <button (click)="onLogout()" class="w-full py-4 px-6 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 font-bold rounded-2xl transition-all active:scale-[0.98] border border-red-100 dark:border-red-500/20">
          Log Out
        </button>
        <div class="text-center pb-8">
          <p class="text-[10px] text-slate-400 font-medium uppercase tracking-[0.2em]">FreelanceHub v2.4.0</p>
        </div>
      </div>
    </main>
  </div>
</ion-content>
