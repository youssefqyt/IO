<ion-content fullscreen>
  <div class="screen">
    <div class="panel">
      <div class="top-row">
        <div class="brand">FW</div>
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="progressPercent"></div>
        </div>
      </div>

      <h1>What are you interested in?</h1>
      <p class="subtitle">Choose categories to customize your feed and find relevant opportunities.</p>

      <div class="grid">
        <div
          class="card"
          *ngFor="let item of interests"
          [class.selected]="item.selected"
          (click)="toggleInterest(item)"
        >
          <div class="check-dot" *ngIf="item.selected">
            <span class="material-icons-round">check</span>
          </div>

          <div class="icon-wrap">
            <span class="material-symbols-outlined">{{ item.icon }}</span>
          </div>

          <div class="label">{{ item.name }}</div>
        </div>
      </div>

      <button class="continue-btn" (click)="continue()">
        Continue
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>

      <p class="hint">YOU CAN CHANGE THIS LATER</p>
    </div>
  </div>
</ion-content>
