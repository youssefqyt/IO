<article
  (click)="onCardClick()"
  class="cursor-pointer rounded-2xl border border-slate-100 bg-white p-2.5 shadow-[0_4px_10px_rgba(15,23,42,0.04)]"
>
  <div class="relative mb-2.5 overflow-hidden rounded-2xl border border-slate-100 bg-slate-100">
    <img [src]="product.image" [alt]="product.alt" class="h-[140px] w-full object-cover" />
  </div>

  <h3 class="mb-0.5 text-[12px] font-semibold text-slate-900">{{ product.title }}</h3>
  <p class="mb-1 text-[8px] font-semibold uppercase tracking-[0.12em] text-slate-400">{{ product.studio }}</p>

  <div class="flex items-center justify-between gap-2">
    <span class="text-[14px] font-bold text-[#f97316]">{{ product.price }}</span>
  </div>
</article>
