<ion-content [fullscreen]="true" class="browse-content">
  <div class="relative z-10 w-full max-w-full px-4 pt-8 pb-28">
    <header class="mb-5">
      <div class="mb-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="h-8 w-8">
            <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 10C20 4.47715 24.4772 0 30 0H70C75.5228 0 80 4.47715 80 10V20C80 25.5228 75.5228 30 70 30H45V45H65C70.5228 45 75 49.4772 75 55V65C75 70.5228 70.5228 75 65 75H30C24.4772 75 20 70.5228 20 65V10Z" fill="var(--primary-blue)"/>
              <path d="M50 35L65 65L80 35L95 65" stroke="var(--accent-orange)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1 class="text-[22px] font-extrabold tracking-tight text-slate-900">Browse Projects</h1>
        </div>
        <button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100">
          <span class="material-symbols-outlined text-slate-600">notifications</span>
        </button>
      </div>

      <div class="space-y-3">
        <div class="relative">
          <span class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            name="browseProjectSearch"
            placeholder="Search for jobs..."
            aria-label="Search projects"
            title="Search projects"
            class="h-10 w-full rounded-2xl border border-slate-100 bg-slate-100 pl-10 pr-4 text-[13px] text-slate-700 placeholder:text-slate-400 focus:border-primary focus:bg-white focus:outline-none"
          />
        </div>
        <div class="hide-scrollbar flex gap-2 overflow-x-auto pb-1">
          <button
            *ngFor="let category of categories"
            type="button"
            (click)="selectCategory(category)"
            class="whitespace-nowrap rounded-full px-4 py-2 text-[11px] font-semibold"
            [ngClass]="selectedCategory === category ? 'bg-primary text-white shadow-[0_8px_18px_rgba(37,99,235,0.28)]' : 'bg-white border border-slate-200 text-slate-600'"
          >
            {{ category }}
          </button>
        </div>
      </div>
    </header>

    <section class="space-y-4">
      <app-project-card *ngFor="let project of filteredProjects" [project]="project"></app-project-card>

      <div *ngIf="!filteredProjects.length" class="rounded-2xl border border-slate-200 bg-white p-5 text-center text-sm text-slate-500">
        No projects match your search.
      </div>
    </section>
  </div>
</ion-content>
