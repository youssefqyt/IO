<ion-header class="ion-no-border">
  <ion-toolbar class="bg-background-light dark:bg-background-dark">
    <ion-grid>
      <ion-row class="ion-justify-content-center">
        <ion-col size="12" size-md="10" size-lg="8" size-xl="6" class="ion-padding">
          <div class="flex items-center gap-2 mb-8">
            <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white font-bold text-xs">
              FW
            </div>
            <div class="h-1 flex-1 max-w-[100px] bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
              <div class="h-full bg-primary w-2/3 rounded-full"></div>
            </div>
          </div>
          <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">
            What are you interested in?
          </h1>
          <p class="text-slate-500 dark:text-slate-400 mt-2">
            Choose categories to customize your feed and find relevant opportunities.
          </p>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-background-light dark:bg-background-dark font-display">
  <ion-grid fixed>
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-md="10" size-lg="8" size-xl="6">
        <div class="grid grid-cols-2 gap-4 ion-padding">
          <div *ngFor="let interest of interests"
               class="flex flex-col items-start p-4 text-left bg-white dark:bg-slate-900 border-2 rounded-2xl shadow-sm transition-all cursor-pointer"
               [class.selected]="interest.selected"
               (click)="toggleInterest(interest)">
            
            <div class="w-full flex justify-end min-h-[20px]">
              <div *ngIf="interest.selected" class="bg-secondary rounded-full p-0.5 flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-[14px] text-white font-bold">check</span>
              </div>
            </div>

            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-primary mb-3"
                 [class]="interest.selected ? 'bg-primary/10 text-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400'">
              <span class="material-symbols-outlined">{{ interest.icon }}</span>
            </div>
            <span class="font-semibold text-slate-900 dark:text-white">{{ interest.name }}</span>
          </div>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar class="bg-background-light dark:bg-background-dark">
    <ion-grid>
      <ion-row class="ion-justify-content-center">
        <ion-col size="12" size-md="10" size-lg="8" size-xl="6" class="ion-padding">
          <button class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2"
                  (click)="continue()">
            Continue
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
          <p class="text-center text-slate-400 text-xs mt-4 font-medium uppercase tracking-widest">
            You can change this later
          </p>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-footer>
